<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐠 语法钓鱼大冒险 - 现在进行时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'YouYuan', cursive, sans-serif;
            background: linear-gradient(180deg, #1E90FF 0%, #00BFFF 50%, #87CEEB 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        .game-container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            border: 5px solid #1E90FF;
        }
        .header {
            background: linear-gradient(90deg, #1E90FF 0%, #00CED1 100%);
            padding: 12px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 1.3em; margin-bottom: 8px; }
        .stats { display: flex; justify-content: space-around; font-size: 0.95em; }
        .stat-item { background: rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 12px; }
        .content { padding: 15px; }
        
        /* 钓鱼场景 */
        .fishing-scene {
            position: relative;
            height: 280px;
            background: linear-gradient(180deg, #87CEEB 0%, #1E90FF 60%, #006088 100%);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .ocean-floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #C2B280;
        }
        .seaweed {
            position: absolute;
            bottom: 30px;
            font-size: 2em;
            animation: sway 3s ease-in-out infinite;
        }
        @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .bubble {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: rise 4s linear infinite;
        }
        @keyframes rise { 0% { bottom: 0; opacity: 0; } 50% { opacity: 1; } 100% { bottom: 300px; opacity: 0; } }
        
        /* 鱼 */
        .fish {
            position: absolute;
            font-size: 2.5em;
            transition: all 0.5s;
            cursor: pointer;
            animation: swim 2s ease-in-out infinite;
        }
        @keyframes swim { 0%, 100% { transform: translateY(0) scaleX(1); } 50% { transform: translateY(-10px) scaleX(1); } }
        .fish.caught { animation: caught 0.5s forwards; }
        @keyframes caught { 0% { transform: scale(1); } 100% { transform: scale(0) translateY(-50px); opacity: 0; } }
        .fish.escaped { animation: escaped 0.5s forwards; }
        @keyframes escaped { 0% { transform: translateX(0); } 100% { transform: translateX(200px); opacity: 0; } }
        
        /* 钓鱼竿 */
        .fishing-rod {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2.5em;
            transform: rotate(-30deg);
            transition: transform 0.3s;
        }
        .fishing-rod.casting { transform: rotate(0deg); }
        .fishing-line {
            position: absolute;
            top: 40px;
            right: 45px;
            width: 2px;
            height: 0;
            background: #fff;
            transition: height 0.5s;
        }
        .fishing-line.cast { height: 150px; }
        .hook {
            position: absolute;
            top: 0;
            right: -6px;
            font-size: 1.2em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .fishing-line.cast .hook { opacity: 1; }
        
        /* 钓到的鱼显示 */
        .caught-fish-display {
            position: absolute;
            top: 50px;
            right: 20px;
            font-size: 2em;
            opacity: 0;
            transition: all 0.5s;
        }
        .caught-fish-display.show { opacity: 1; animation: bounce 0.5s; }
        
        /* 分数弹出 */
        .score-popup {
            position: absolute;
            font-size: 1.5em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            animation: popUp 1s forwards;
            pointer-events: none;
        }
        @keyframes popUp { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: translateY(-50px) scale(1); opacity: 0; } }
        
        /* 问题区域 */
        .question-area {
            background: linear-gradient(135deg, #E0F7FA 0%, #B2EBF2 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 3px solid #1E90FF;
        }
        .question-text { font-size: 1.15em; color: #333; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .option-btn {
            background: white;
            border: 3px solid #1E90FF;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .option-btn:hover { background: #1E90FF; color: white; }
        .option-btn.correct { background: #32CD32; border-color: #32CD32; color: white; }
        .option-btn.wrong { background: #FF6B6B; border-color: #FF6B6B; color: white; }
        .feedback { text-align: center; font-size: 1em; margin-top: 10px; min-height: 25px; font-weight: bold; }
        .feedback.correct { color: #228B22; }
        .feedback.wrong { color: #FF6B6B; }
        
        /* 按钮 */
        .btn {
            background: linear-gradient(90deg, #1E90FF 0%, #00CED1 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); }
        
        /* 隐藏 */
        .hidden { display: none; }
        
        /* 开始/结束画面 */
        .start-screen, .end-screen { text-align: center; padding: 20px; }
        .start-screen h2, .end-screen h2 { font-size: 1.5em; color: #1E90FF; margin-bottom: 15px; }
        .start-screen p { font-size: 1em; color: #666; margin-bottom: 20px; line-height: 1.6; }
        .fish-collection { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 15px 0; font-size: 1.8em; }
        .trophy { font-size: 4em; margin: 20px 0; }
        
        /* 渔获统计 */
        .catch-stats {
            text-align: center;
            background: #FFF8DC;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        .catch-stats span { margin: 0 8px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐠 语法钓鱼大冒险</h1>
            <div class="stats">
                <div class="stat-item">🎣 <span id="score">0</span></div>
                <div class="stat-item">❤️ <span id="lives">3</span></div>
                <div class="stat-item">🐟 <span id="fish">0</span></div>
            </div>
        </div>
        <div class="content">
            <!-- 开始画面 -->
            <div class="start-screen" id="startScreen">
                <div style="font-size: 4em; margin: 20px 0;">🎣🐠</div>
                <h2>欢迎来到语法钓鱼王国！</h2>
                <p>答对语法问题，就能钓到可爱的鱼！<br>每种鱼都有不同的分数哦～<br><br>🐟 小鱼 = 10分<br>🐠 中鱼 = 20分<br>🦈 大鱼 = 30分<br><br>加油！Let's go! 🚀</p>
                <button class="btn" onclick="startGame()">开始钓鱼！</button>
            </div>
            
            <!-- 游戏画面 -->
            <div class="game-screen hidden" id="gameScreen">
                <div class="fishing-scene" id="fishingScene">
                    <div class="fishing-rod" id="fishingRod">🎣</div>
                    <div class="fishing-line" id="fishingLine"><div class="hook">🪝</div></div>
                    <div class="caught-fish-display" id="caughtFish">🐠</div>
                    <div class="ocean-floor"></div>
                    <div class="seaweed" style="left: 10px;">🌿</div>
                    <div class="seaweed" style="left: 50px; animation-delay: 0.5s;">🌿</div>
                    <div class="seaweed" style="left: 200px; animation-delay: 1s;">🌿</div>
                    <!-- 鱼群 -->
                    <div id="fishSchool"></div>
                </div>
                
                <div class="catch-stats">
                    本轮已钓到: <span id="roundFish">0</span> 条鱼 | 
                    最高分鱼: <span id="bestFish">-</span>
                </div>
                
                <div class="question-area">
                    <div class="question-text" id="questionText">题目加载中...</div>
                    <div class="options" id="options"></div>
                </div>
                <div class="feedback" id="feedback"></div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">下一条鱼 →</button>
            </div>
            
            <!-- 结束画面 -->
            <div class="end-screen hidden" id="endScreen">
                <div class="trophy" id="trophy">🏆</div>
                <h2 id="endTitle">🎉 钓鱼结束！</h2>
                <p id="endMessage">你太厉害了！</p>
                <p style="font-size: 1.3em; color: #1E90FF; margin: 15px 0;">
                    共钓到 <strong id="finalFish">0</strong> 条鱼！
                </p>
                <div class="fish-collection" id="fishCollection"></div>
                <button class="btn" onclick="restartGame()">再钓一次！</button>
            </div>
        </div>
    </div>
    
    <script>
        // 鱼群类型
        const fishTypes = [
            { emoji: '🐟', name: '小鱼', points: 10, speed: 3 },
            { emoji: '🐠', name: '中鱼', points: 20, speed: 2 },
            { emoji: '🐡', name: '河豚', points: 15, speed: 2.5 },
            { emoji: '🦈', name: '鲨鱼', points: 30, speed: 4 },
            { emoji: '🐙', name: '章鱼', points: 25, speed: 1.5 },
            { emoji: '🦀', name: '螃蟹', points: 20, speed: 1 }
        ];
        
        // 语法题目
        const questions = [
            { text: "I ___ reading a book now.", options: ["am", "is", "are"], answer: 0, hint: "I + am" },
            { text: "She ___ sleeping.", options: ["am", "is", "are"], answer: 1, hint: "She + is" },
            { text: "They ___ playing games.", options: ["am", "is", "are"], answer: 2, hint: "They + are" },
            { text: "He ___ playing football.", options: ["am", "is", "are"], answer: 1, hint: "He + is" },
            { text: "We ___ watching TV.", options: ["am", "is", "are"], answer: 2, hint: "We + are" },
            { text: "Look! The bird ___ flying.", options: ["is", "are", "am"], answer: 0, hint: "单数用 is" },
            { text: "Listen! She ___ singing.", options: ["is", "are", "am"], answer: 0, hint: "She 是单数" },
            { text: "I ___ eating breakfast.", options: ["am", "is", "are"], answer: 0, hint: "I + am" },
            { text: "He ___ to school.", options: ["go", "going", "goes"], answer: 1, hint: "go → going" },
            { text: "She is ___ a song.", options: ["sing", "singing", "sings"], answer: 1, hint: "sing → singing" },
            { text: "They are ___ games.", options: ["play", "playing", "plays"], answer: 1, hint: "play → playing" },
            { text: "We are ___ in the park.", options: ["run", "running", "runs"], answer: 1, hint: "run → running" },
            { text: "I ___ not sleeping.", options: ["am", "is", "are"], answer: 0, hint: "I + am not" },
            { text: "She ___ not eating.", options: ["am", "is", "aren't"], answer: 1, hint: "isn't" },
            { text: "They ___ not playing.", options: ["am", "is", "aren't"], answer: 2, hint: "aren't" },
            { text: "___ you sleeping?", options: ["Are", "Is", "Am"], answer: 0, hint: "Are you...?" },
            { text: "___ she eating?", options: ["Are", "Is", "Am"], answer: 1, hint: "Is she...?" },
            { text: "___ they playing?", options: ["Are", "Is", "Am"], answer: 0, hint: "Are they...?" },
            { text: "Yes, I ___.", options: ["am", "is", "are"], answer: 0, hint: "Yes, I am" },
            { text: "No, she ___.", options: ["am not", "isn't", "aren't"], answer: 1, hint: "No, she isn't" },
            { text: "She ___ a cake.", options: ["is making", "are making", "am making"], answer: 0, hint: "is making" },
            { text: "I ___ my homework.", options: ["am doing", "is doing", "are doing"], answer: 0, hint: "am doing" },
            { text: "They ___ breakfast.", options: ["is eating", "are eating", "am eating"], answer: 1, hint: "are eating" },
            { text: "Look! The cat ___ the tree.", options: ["is climbing", "are climbing", "am climbing"], answer: 0, hint: "is climbing" },
            { text: "He ___ basketball.", options: ["is playing", "are playing", "am playing"], answer: 0, hint: "is playing" },
            { text: "We ___ about the future.", options: ["is talking", "are talking", "am talking"], answer: 1, hint: "are talking" }
        ];
        
        let gameState = {
            score: 0,
            lives: 3,
            fishCaught: 0,
            roundFish: 0,
            bestFish: '🐟',
            currentQuestions: [],
            currentFish: null,
            fishPool: []
        };
        
        function saveGame() {
            localStorage.setItem('fishingGameStatePC', JSON.stringify(gameState));
        }
        
        function loadGame() {
            const saved = localStorage.getItem('fishingGameStatePC');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                gameState.lives = 3;
            }
            updateStats();
        }
        
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function updateStats() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = '❤️'.repeat(gameState.lives);
            document.getElementById('fish').textContent = gameState.fishCaught;
            document.getElementById('roundFish').textContent = gameState.roundFish;
            document.getElementById('bestFish').textContent = gameState.bestFish;
        }
        
        function startGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.roundFish = 0;
            gameState.fishPool = shuffleArray([...questions]);
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            
            // 生成鱼群
            createFishSchool();
            
            // 开始钓鱼
            castLine();
            updateStats();
        }
        
        function createFishSchool() {
            const container = document.getElementById('fishSchool');
            container.innerHTML = '';
            
            // 随机生成8-12条鱼
            const fishCount = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < fishCount; i++) {
                const fish = document.createElement('div');
                fish.className = 'fish';
                const fishType = fishTypes[Math.floor(Math.random() * fishTypes.length)];
                fish.dataset.type = JSON.stringify(fishType);
                fish.textContent = fishType.emoji;
                fish.style.left = Math.random() * 400 + 'px';
                fish.style.top = Math.random() * 150 + 50 + 'px';
                fish.style.animationDuration = (2 + Math.random()) + 's';
                fish.style.animationDelay = Math.random() + 's';
                container.appendChild(fish);
            }
            
            // 添加气泡
            for (let i = 0; i < 5; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 500 + 'px';
                bubble.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(bubble);
            }
        }
        
        function castLine() {
            // 放下鱼竿
            document.getElementById('fishingRod').classList.add('casting');
            document.getElementById('fishingLine').classList.add('cast');
            
            // 选择一条鱼作为目标
            const fishes = document.querySelectorAll('#fishSchool .fish');
            if (fishes.length > 0) {
                const targetFish = fishes[Math.floor(Math.random() * fishes.length)];
                gameState.currentFish = JSON.parse(targetFish.dataset.type);
                gameState.currentFish.element = targetFish;
            }
            
            // 显示问题
            showQuestion();
        }
        
        function showQuestion() {
            if (gameState.fishPool.length === 0) {
                gameState.fishPool = shuffleArray([...questions]);
            }
            
            const q = gameState.fishPool.pop();
            gameState.currentQuestion = q;
            
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('feedback').textContent = '';
            document.getElementById('nextBtn').style.display = 'none';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });
            
            window.canAnswer = true;
        }
        
        function checkAnswer(selectedIndex, btn) {
            if (!window.canAnswer) return;
            window.canAnswer = false;
            
            const q = gameState.currentQuestion;
            const feedback = document.getElementById('feedback');
            
            if (selectedIndex === q.answer) {
                btn.classList.add('correct');
                feedback.textContent = '🎉 答对了！钓到 ' + gameState.currentFish.emoji;
                feedback.className = 'feedback correct';
                
                // 钓到鱼！
                gameState.score += gameState.currentFish.points;
                gameState.fishCaught++;
                gameState.roundFish++;
                
                // 更新最佳鱼
                if (gameState.currentFish.points > fishTypes.find(f => f.emoji === gameState.bestFish).points) {
                    gameState.bestFish = gameState.currentFish.emoji;
                }
                
                // 鱼被钓起动画
                if (gameState.currentFish && gameState.currentFish.element) {
                    gameState.currentFish.element.classList.add('caught');
                }
                
                // 显示钓到的鱼
                const caughtDisplay = document.getElementById('caughtFish');
                caughtDisplay.textContent = gameState.currentFish.emoji;
                caughtDisplay.classList.add('show');
                
                // 分数弹出
                showScorePopup('+' + gameState.currentFish.points);
                
                // 检查是否获胜（钓到5条鱼过关）
                if (gameState.roundFish >= 5) {
                    gameState.score += 50; // 通关奖励
                    setTimeout(() => endGame(true), 1500);
                    return;
                }
                
                // 移除钓到的鱼，生成新的
                setTimeout(() => {
                    if (gameState.currentFish && gameState.currentFish.element) {
                        gameState.currentFish.element.remove();
                    }
                    createFishSchool();
                    castLine();
                }, 1500);
                
            } else {
                btn.classList.add('wrong');
                feedback.textContent = '💡 ' + q.hint;
                feedback.className = 'feedback wrong';
                gameState.lives--;
                
                // 鱼跑掉了
                if (gameState.currentFish && gameState.currentFish.element) {
                    gameState.currentFish.element.classList.add('escaped');
                }
                
                setTimeout(() => {
                    if (gameState.currentFish && gameState.currentFish.element) {
                        gameState.currentFish.element.remove();
                    }
                    
                    if (gameState.lives <= 0) {
                        endGame(false);
                        return;
                    }
                    
                    createFishSchool();
                    castLine();
                }, 1500);
            }
            
            updateStats();
            document.getElementById('nextBtn').style.display = 'block';
            saveGame();
        }
        
        function showScorePopup(text) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = text;
            popup.style.left = '50%';
            popup.style.top = '40%';
            document.getElementById('fishingScene').appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }
        
        function nextQuestion() {
            // 继续钓鱼
            createFishSchool();
            castLine();
        }
        
        function endGame(success) {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            
            if (success) {
                document.getElementById('trophy').textContent = '🏆';
                document.getElementById('endTitle').textContent = '🎉 钓鱼成功！';
                document.getElementById('endMessage').textContent = '你钓到了 ' + gameState.roundFish + ' 条鱼！太厉害了！';
            } else {
                document.getElementById('trophy').textContent = '😢';
                document.getElementById('endTitle').textContent = '鱼都跑掉了！';
                document.getElementById('endMessage').textContent = '别灰心，再试一次！';
            }
            
            document.getElementById('finalFish').textContent = gameState.fishCaught;
            
            // 显示钓到的鱼
            const collection = document.getElementById('fishCollection');
            collection.innerHTML = '';
            for (let i = 0; i < Math.min(gameState.fishCaught, 20); i++) {
                const fish = document.createElement('span');
                fish.textContent = fishTypes[Math.floor(Math.random() * fishTypes.length)].emoji;
                collection.appendChild(fish);
            }
            
            gameState.fishCaught += gameState.roundFish;
            saveGame();
        }
        
        function restartGame() {
            gameState.roundFish = 0;
            gameState.lives = 3;
            startGame();
        }
        
        // 初始化
        window.onload = function() {
            loadGame();
        };
    </script>
</body>
</html>
