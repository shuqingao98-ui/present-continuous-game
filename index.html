<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦖 语法打怪大冒险</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; padding: 10px; }
.game-container { width: 100%; max-width: 400px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

/* 头部 */
.header { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); padding: 15px; text-align: center; color: white; }
.header h1 { font-size: 18px; margin-bottom: 10px; }
.stats-bar { display: flex; justify-content: space-around; font-size: 14px; }
.stat { background: rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 15px; }

/* 页面 */
.page { display: none; padding: 15px; }
.page.active { display: block; }

/* 按钮 */
.btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
.btn-success { background: linear-gradient(90deg, #11998e, #38ef7d); color: white; }
.btn-warning { background: linear-gradient(90deg, #f093fb, #f5576c); color: white; }

/* 战斗场景 */
.battle-scene { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 15px; padding: 20px; margin: 15px 0; position: relative; height: 180px; }
.monster-area { text-align: center; color: white; }
.monster-emoji { font-size: 80px; margin: 10px 0; }
.monster-name { font-size: 18px; font-weight: bold; }
.hp-bar { background: #333; height: 20px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
.hp-fill { background: linear-gradient(90deg, #ff6b6b, #ee5a24); height: 100%; transition: width 0.3s; }
.combo { position: absolute; top: 10px; left: 10px; background: #ffd700; color: #333; padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 14px; }

/* 题目区域 */
.question-box { background: #f8f9fa; border-radius: 15px; padding: 20px; margin: 15px 0; }
.question-text { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px; text-align: center; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-btn { padding: 15px; border: 2px solid #667eea; background: white; border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
.option-btn:hover { background: #667eea; color: white; }
.option-btn.correct { background: #00b894; border-color: #00b894; color: white; }
.option-btn.wrong { background: #d63031; border-color: #d63031; color: white; }
.feedback { text-align: center; margin-top: 15px; font-weight: bold; min-height: 24px; }
.feedback.correct { color: #00b894; }
.feedback.wrong { color: #d63031; }

/* 道具栏 */
.items { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
.item-btn { width: 60px; height: 60px; border: 2px solid #ddd; background: white; border-radius: 12px; font-size: 24px; cursor: pointer; position: relative; }
.item-btn:active { transform: scale(0.95); }
.item-count { position: absolute; bottom: -5px; right: -5px; background: #e94560; color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; }

/* 关卡选择 */
.level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
.level-btn { aspect-ratio: 1; border: 2px solid #667eea; background: white; border-radius: 15px; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.level-btn.completed { background: #d4edda; border-color: #00b894; }

/* 商店 */
.shop-item { display: flex; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 10px 0; cursor: pointer; }
.shop-item .emoji { font-size: 40px; margin-right: 15px; }
.shop-item .info { flex: 1; }
.shop-item .price { color: #f39c12; font-weight: bold; }
</style>
</head>
<body>
<div class="game-container">
  <!-- 头部 -->
  <div class="header">
    <h1>🦖 语法打怪大冒险</h1>
    <div class="stats-bar">
      <span class="stat">❤️ <span id="lives">3</span></span>
      <span class="stat">🪙 <span id="coins">0</span></span>
      <span class="stat">👾 <span id="defeated">0</span></span>
    </div>
  </div>

  <!-- 主菜单 -->
  <div id="page-menu" class="page active">
    <div style="text-align: center; padding: 30px 0;">
      <div style="font-size: 80px; margin-bottom: 20px;">🦖⚔️</div>
      <h2 style="margin-bottom: 20px;">现在进行时练习</h2>
      <p style="color: #666; margin-bottom: 30px;">答对题目攻击怪兽！<br>连击3次触发暴击！</p>
    </div>
    <button class="btn btn-primary" onclick="showPage('levels')">开始游戏 🎮</button>
    <button class="btn btn-success" onclick="showPage('shop')">道具商店 🛒</button>
  </div>

  <!-- 关卡选择 -->
  <div id="page-levels" class="page">
    <h3 style="text-align: center; margin-bottom: 15px;">选择关卡</h3>
    <div class="level-grid" id="level-grid"></div>
    <button class="btn btn-warning" onclick="showPage('menu')">返回</button>
  </div>

  <!-- 游戏页面 -->
  <div id="page-game" class="page">
    <div class="battle-scene">
      <div class="combo" id="combo">⚡ 0</div>
      <div class="monster-area">
        <div class="monster-emoji" id="monster-emoji">👾</div>
        <div class="monster-name" id="monster-name">小怪物</div>
        <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width: 100%"></div></div>
      </div>
    </div>
    <div class="items">
      <button class="item-btn" onclick="useItem('hint')">💡<span class="item-count" id="hint-count">2</span></button>
      <button class="item-btn" onclick="useItem('heal')">❤️<span class="item-count" id="heal-count">1</span></button>
      <button class="item-btn" onclick="useItem('shield')">🛡️<span class="item-count" id="shield-count">0</span></button>
    </div>
    <div class="question-box">
      <div class="question-text" id="question-text">加载中...</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn btn-warning" onclick="showPage('levels')">放弃</button>
  </div>

  <!-- 商店 -->
  <div id="page-shop" class="page">
    <h3 style="text-align: center; margin-bottom: 15px;">🛒 道具商店</h3>
    <div class="shop-item" onclick="buyItem('hint')">
      <div class="emoji">💡</div>
      <div class="info"><div><b>提示卡</b></div><div>显示答案</div></div>
      <div class="price">🪙 30</div>
    </div>
    <div class="shop-item" onclick="buyItem('heal')">
      <div class="emoji">❤️</div>
      <div class="info"><div><b>生命药水</b></div><div>恢复生命</div></div>
      <div class="price">🪙 50</div>
    </div>
    <div class="shop-item" onclick="buyItem('shield')">
      <div class="emoji">🛡️</div>
      <div class="info"><div><b>护盾</b></div><div>抵挡错误</div></div>
      <div class="price">🪙 80</div>
    </div>
    <button class="btn btn-warning" onclick="showPage('menu')">返回</button>
  </div>

  <!-- 胜利页面 -->
  <div id="page-victory" class="page" style="text-align: center; padding: 50px 20px;">
    <div style="font-size: 100px; margin-bottom: 20px;">🎉</div>
    <h2 style="margin-bottom: 20px;">击败怪兽！</h2>
    <p style="color: #666; margin-bottom: 30px;">继续挑战下一关吧！</p>
    <button class="btn btn-primary" onclick="showPage('levels')">下一关 →</button>
  </div>
</div>

<script>
const monsters = [
  {emoji: '👾', name: '小怪物', hp: 6},
  {emoji: '🐉', name: '幼龙', hp: 6},
  {emoji: '🦖', name: '霸王龙', hp: 8},
  {emoji: '🐊', name: '鳄鱼王', hp: 8},
  {emoji: '🦑', name: '深海巨妖', hp: 8},
  {emoji: '🦂', name: '毒蝎', hp: 8},
  {emoji: '🐺', name: '狼人', hp: 10},
  {emoji: '🦇', name: '吸血鬼', hp: 10},
  {emoji: '👹', name: '恶魔', hp: 10},
  {emoji: '👿', name: '魔王', hp: 12}
];

const questions = [
  [['I ___ a book now.', ['am reading', 'is reading', 'are reading'], 0, 'I用am'],
   ['She ___ in the room.', ['is dancing', 'are dancing', 'am dancing'], 0, 'She用is'],
   ['They ___ football.', ['is playing', 'are playing', 'am playing'], 1, 'They用are'],
   ['We ___ TV.', ['is watching', 'are watching', 'am watching'], 1, 'We用are'],
   ['He ___ fast.', ['is running', 'are running', 'am running'], 0, 'He用is'],
   ['The cat ___.', ['is sleeping', 'are sleeping', 'am sleeping'], 0, '单数用is'],
   ['You ___ a song.', ['is singing', 'are singing', 'am singing'], 1, 'You用are'],
   ['The birds ___.', ['is flying', 'are flying', 'am flying'], 1, '复数用are']],
  [['My mother ___ dinner.', ['is cooking', 'are cooking', 'am cooking'], 0],
   ['The students ___ homework.', ['is writing', 'are writing', 'am writing'], 1],
   ['Tom and Jerry ___.', ['is fighting', 'are fighting', 'am fighting'], 1],
   ['My dog ___ loudly.', ['is barking', 'are barking', 'am barking'], 0],
   ['The teachers ___.', ['is talking', 'are talking', 'am talking'], 1],
   ['Mary ___ a picture.', ['is drawing', 'are drawing', 'am drawing'], 0],
   ['The children ___.', ['is laughing', 'are laughing', 'am laughing'], 1],
   ['My father ___.', ['is working', 'are working', 'am working'], 0]],
  [['Listen! The baby ___.', ['is crying', 'are crying', 'am crying'], 0],
   ['Look! The girls ___.', ['is dancing', 'are dancing', 'am dancing'], 1],
   ['Be quiet! I ___.', ['is thinking', 'are thinking', 'am thinking'], 2],
   ['Hurry up! We ___.', ['is waiting', 'are waiting', 'am waiting'], 1],
   ['The teacher ___.', ['is speaking', 'are speaking', 'am speaking'], 0],
   ['The dog ___.', ['is swimming', 'are swimming', 'am swimming'], 0],
   ['They ___ the tree.', ['is climbing', 'are climbing', 'am climbing'], 1],
   ['A car ___.', ['is coming', 'are coming', 'am coming'], 0]],
  [['___ you ___ English?', ['Are/studying', 'Is/studying', 'Am/studying'], 0],
   ['___ he ___?', ['Are/sleeping', 'Is/sleeping', 'Am/sleeping'], 1],
   ['What ___ you ___?', ['are/doing', 'is/doing', 'am/doing'], 0],
   ['Where ___ they ___?', ['is/going', 'are/going', 'am/going'], 1],
   ['Why ___ she ___?', ['are/crying', 'is/crying', 'am/crying'], 1],
   ['___ it ___?', ['Are/raining', 'Is/raining', 'Am/raining'], 1],
   ['Who ___?', ['is knocking', 'are knocking', 'am knocking'], 0],
   ['What ___ Tom ___?', ['are/eating', 'is/eating', 'am/eating'], 1]],
  [['I ___ TV.', ['am not watching', "isn't watching", "aren't watching"], 0],
   ['He ___ games.', ['am not playing', "isn't playing", "aren't playing"], 1],
   ['They ___ now.', ['am not studying', "isn't studying", "aren't studying"], 2],
   ['She ___.', ['am not singing', "isn't singing", "aren't singing"], 1],
   ['We ___.', ['am not swimming', "isn't swimming", "aren't swimming"], 2],
   ['The bird ___.', ['am not flying', "isn't flying", "aren't flying"], 1],
   ['You ___.', ['am not listening', "isn't listening", "aren't listening"], 2],
   ['It ___.', ['am not working', "isn't working", "aren't working"], 1]],
  [['___ they ___ lunch?', ['Are/having', 'Is/having', 'Am/having'], 0],
   ['The sun ___.', ['is shining', 'are shining', 'am shining'], 0],
   ['The children ___ noise.', ['is making', 'are making', 'am making'], 1],
   ['___ you ___ OK?', ['Are/feeling', 'Is/feeling', 'Am/feeling'], 0],
   ['My grandma ___ a story.', ['is telling', 'are telling', 'am telling'], 0],
   ['The boys ___ bikes.', ['is riding', 'are riding', 'am riding'], 1],
   ['Someone ___ the bell.', ['is ringing', 'are ringing', 'am ringing'], 0],
   ['The wind ___.', ['is blowing', 'are blowing', 'am blowing'], 0]],
  [['The baby ___.', ['is sleeping', 'are sleeping', 'am sleeping'], 0],
   ['The train ___.', ['is arriving', 'are arriving', 'am arriving'], 0],
   ['It ___.', ['is raining', 'are raining', 'am raining'], 0],
   ['You ___ time.', ['is wasting', 'are wasting', 'am wasting'], 1],
   ['I ___ you something.', ['is showing', 'are showing', 'am showing'], 2],
   ['The plane ___.', ['is landing', 'are landing', 'am landing'], 0],
   ['The bus ___.', ['is leaving', 'are leaving', 'am leaving'], 0],
   ['Someone ___ piano.', ['is playing', 'are playing', 'am playing'], 0]],
  [['Why ___ you ___?', ['are/laughing', 'is/laughing', 'am/laughing'], 0],
   ['The dog ___ at stranger.', ['is barking', 'are barking', 'am barking'], 0],
   ['___ students ___ notes?', ['Are/taking', 'Is/taking', 'Am/taking'], 0],
   ['I ___ for my pen.', ['am looking', 'is looking', 'are looking'], 0],
   ['She ___ meat.', ['am not eating', "isn't eating", "aren't eating"], 1],
   ['The fish ___.', ['is swimming', 'are swimming', 'am swimming'], 0],
   ['We ___ good time.', ['is having', 'are having', 'am having'], 1],
   ['___ you ___ for me?', ['Are/waiting', 'Is/waiting', 'Am/waiting'], 0]]
];

let game = {
  level: 1, qIndex: 0, lives: 3, coins: 0, defeated: 0,
  combo: 0, items: {hint: 2, heal: 1, shield: 0}, hasShield: false,
  monsterHp: 0, maxHp: 0, currentQs: []
};

function save() { localStorage.setItem('grammarGame', JSON.stringify(game)); }
function load() {
  const s = localStorage.getItem('grammarGame');
  if (s) Object.assign(game, JSON.parse(s));
  updateStats();
}

function updateStats() {
  document.getElementById('lives').textContent = game.lives;
  document.getElementById('coins').textContent = game.coins;
  document.getElementById('defeated').textContent = game.defeated;
  document.getElementById('hint-count').textContent = game.items.hint;
  document.getElementById('heal-count').textContent = game.items.heal;
  document.getElementById('shield-count').textContent = game.items.shield;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (id === 'levels') renderLevels();
}

function renderLevels() {
  const g = document.getElementById('level-grid');
  g.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const b = document.createElement('button');
    b.className = 'level-btn' + (i <= game.defeated + 1 ? '' : ' disabled');
    b.style.opacity = i <= game.defeated + 1 ? '1' : '0.3';
    b.innerHTML = monsters[i-1].emoji + '<div style="font-size:12px;">Lv.' + i + '</div>';
    b.onclick = () => i <= game.defeated + 1 && startLevel(i);
    g.appendChild(b);
  }
}

function startLevel(lv) {
  game.level = lv; game.qIndex = 0; game.combo = 0; game.hasShield = false;
  game.maxHp = monsters[lv-1].hp; game.monsterHp = game.maxHp;
  game.currentQs = [...questions[lv-1]].sort(() => Math.random() - 0.5);
  showPage('game');
  document.getElementById('monster-emoji').textContent = monsters[lv-1].emoji;
  document.getElementById('monster-name').textContent = monsters[lv-1].name;
  updateHp(); updateStats(); showQuestion();
}

function updateHp() {
  document.getElementById('hp-fill').style.width = (game.monsterHp / game.maxHp * 100) + '%';
}

function showQuestion() {
  const q = game.currentQs[game.qIndex];
  document.getElementById('question-text').textContent = q[0];
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q[1].forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'option-btn';
    b.textContent = opt;
    b.onclick = () => answer(i, b);
    opts.appendChild(b);
  });
  window.answering = true;
}

function answer(idx, btn) {
  if (!window.answering) return;
  window.answering = false;
  const q = game.currentQs[game.qIndex];
  const fb = document.getElementById('feedback');
  
  if (idx === q[2]) {
    btn.classList.add('correct');
    game.combo++;
    const crit = game.combo >= 3;
    const dmg = crit ? 2 : 1;
    game.monsterHp -= dmg;
    game.coins += crit ? 10 : 5;
    fb.textContent = crit ? '💥 暴击! -' + dmg + 'HP' : '⚔️ 攻击! -' + dmg + 'HP';
    fb.className = 'feedback correct';
    if (crit) game.combo = 0;
    updateHp(); updateStats();
    if (game.monsterHp <= 0) {
      setTimeout(() => { game.defeated++; save(); showPage('victory'); }, 800);
      return;
    }
  } else {
    btn.classList.add('wrong');
    if (game.hasShield) {
      game.hasShield = false;
      fb.textContent = '🛡️ 护盾保护!';
      fb.className = 'feedback';
    } else {
      game.lives--; game.combo = 0;
      fb.textContent = '💡 ' + (q[3] || '再想想');
      fb.className = 'feedback wrong';
      if (game.lives <= 0) {
        setTimeout(() => { alert('游戏结束!'); showPage('menu'); }, 500);
        return;
      }
    }
    updateStats();
  }
  document.getElementById('combo').textContent = '⚡ ' + game.combo;
  setTimeout(() => { game.qIndex++; showQuestion(); }, 1000);
}

function useItem(type) {
  if (game.items[type] <= 0) return;
  if (type === 'hint') {
    game.items.hint--;
    const q = game.currentQs[game.qIndex];
    document.getElementById('feedback').textContent = '💡 ' + (q[3] || '选第' + (q[2]+1) + '个');
  } else if (type === 'heal') {
    if (game.lives >= 3) return alert('生命值已满!');
    game.items.heal--; game.lives++;
  } else if (type === 'shield') {
    if (game.hasShield) return;
    game.items.shield--; game.hasShield = true;
    alert('🛡️ 护盾已激活!');
  }
  save(); updateStats();
}

function buyItem(type) {
  const prices = {hint: 30, heal: 50, shield: 80};
  if (game.coins < prices[type]) return alert('金币不足!');
  game.coins -= prices[type];
  game.items[type]++;
  save(); updateStats();
  alert('购买成功!');
}

window.onload = () => { load(); showPage('menu'); };
</script>
</body>
</html>
