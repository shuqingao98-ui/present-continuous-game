<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 语法打怪大冒险PRO</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
            --gold: #ffd700;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text);
            font-size: 16px;
            line-height: 1.5;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* 屏幕适配 */
        @media (max-width: 400px) {
            body { font-size: 14px; }
            .container { padding: 8px; }
        }

        /* 页面显示 */
        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* 按钮样式 - 触摸友好 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            min-width: 48px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #55efc4);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #ff7675);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #ffeaa7);
            color: #333;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #f9ca24);
            color: #333;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-small {
            min-height: 40px;
            padding: 8px 16px;
            font-size: 14px;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--gold), #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .status-icon {
            font-size: 20px;
        }

        /* 生命值 */
        .health-bar {
            width: 100%;
            height: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--danger), #ff7675);
            transition: width 0.3s ease;
            border-radius: 12px;
        }

        .health-fill.shielded {
            background: linear-gradient(90deg, #74b9ff, #0984e3);
        }

        /* 怪物 */
        .monster {
            text-align: center;
            padding: 20px;
        }

        .monster-emoji {
            font-size: 80px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .monster-hp {
            font-size: 18px;
            margin-top: 10px;
        }

        .monster-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--secondary);
        }

        /* 题目 */
        .question-box {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .answer-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 350px) {
            .answer-options {
                grid-template-columns: 1fr;
            }
        }

        .answer-btn {
            min-height: 56px;
            padding: 12px;
            font-size: 15px;
            text-align: center;
            word-break: break-word;
        }

        /* 计时器 */
        .timer {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--warning);
            margin-bottom: 12px;
        }

        .timer.urgent {
            color: var(--danger);
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 连击 */
        .combo {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 12px;
            min-height: 30px;
        }

        .combo.critical {
            animation: shake 0.3s ease;
            color: #ff6b6b;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 道具栏 */
        .items-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .item-btn {
            flex: 1;
            min-width: 70px;
            min-height: 56px;
            padding: 8px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .item-icon {
            font-size: 24px;
        }

        .item-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-btn:disabled {
            opacity: 0.4;
        }

        /* 关卡选择 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 400px) {
            .level-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .level-btn {
            aspect-ratio: 1;
            min-height: 56px;
            font-size: 18px;
            font-weight: bold;
        }

        .level-btn.locked {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
        }

        .level-btn.completed {
            background: linear-gradient(135deg, var(--success), #55efc4);
        }

        .level-btn.current {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            animation: glow 2s ease infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px var(--primary); }
            50% { box-shadow: 0 0 20px var(--primary); }
        }

        /* 商店 */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shop-item {
            text-align: center;
            padding: 16px;
        }

        .shop-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .shop-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .shop-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* 成就 */
        .achievement-grid {
            display: grid;
            gap: 12px;
        }

        .achievement {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .achievement.locked {
            opacity: 0.4;
        }

        .achievement-icon {
            font-size: 36px;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: bold;
        }

        .achievement-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 错题本 */
        .wrong-note {
            padding: 12px;
            background: rgba(214, 48, 49, 0.2);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--danger);
        }

        .wrong-question {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .wrong-answer {
            color: var(--danger);
            font-size: 14px;
        }

        .correct-answer {
            color: var(--success);
            font-size: 14px;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-text {
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 33, 62, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
        }

        .nav-btn.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 24px;
        }

        /* 内容区域留出底部导航空间 */
        .content-with-nav {
            padding-bottom: 80px;
        }

        /* 动画效果 */
        .correct-flash {
            animation: correctPulse 0.5s ease;
        }

        @keyframes correctPulse {
            0% { background: var(--bg-card); }
            50% { background: rgba(0, 184, 148, 0.3); }
            100% { background: var(--bg-card); }
        }

        .wrong-flash {
            animation: wrongPulse 0.5s ease;
        }

        @keyframes wrongPulse {
            0% { background: var(--bg-card); }
            50% { background: rgba(214, 48, 49, 0.3); }
            100% { background: var(--bg-card); }
        }

        /* 伤害数字 */
        .damage-popup {
            position: fixed;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: damageFloat 1s ease forwards;
            z-index: 999;
        }

        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* 提示文字 */
        .hint-text {
            background: rgba(253, 203, 110, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--warning);
        }

        /* 统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-box {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--gold);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主菜单 -->
        <div id="page-menu" class="page active">
            <div class="content-with-nav">
                <h1 class="title">🦖 语法打怪大冒险PRO</h1>
                <p class="subtitle">现在进行时语法挑战</p>
                
                <div class="card">
                    <div class="status-bar">
                        <div class="status-item">
                            <span class="status-icon">🪙</span>
                            <span id="menu-coins">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon">⭐</span>
                            <span id="menu-level">Lv.1</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon">🏆</span>
                            <span id="menu-achievements">0</span>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="startGame()">🎮 开始冒险</button>
                <button class="btn btn-outline" onclick="showPage('shop')">🛒 商店</button>
                <button class="btn btn-outline" onclick="showPage('achievements')">🏆 成就</button>
                <button class="btn btn-outline" onclick="showPage('wrong-notes')">📖 错题本</button>
                <button class="btn btn-outline" onclick="resetProgress()">🔄 重置进度</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="page-game" class="page">
            <div class="content-with-nav">
                <div class="status-bar">
                    <div class="status-item">
                        <span class="status-icon">🪙</span>
                        <span id="game-coins">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-icon">🔥</span>
                        <span id="game-combo">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-icon">🛡️</span>
                        <span id="game-shield">0</span>
                    </div>
                </div>

                <div class="health-bar">
                    <div class="health-fill" id="monster-hp-bar" style="width: 100%"></div>
                </div>

                <div class="monster">
                    <div class="monster-emoji" id="monster-emoji">👾</div>
                    <div class="monster-name" id="monster-name">小怪物</div>
                    <div class="monster-hp"><span id="monster-hp">100</span>/<span id="monster-max-hp">100</span> HP</div>
                </div>

                <div class="combo" id="combo-display"></div>
                <div class="timer" id="timer">30</div>

                <div class="items-bar">
                    <button class="btn btn-warning item-btn" id="item-hint" onclick="useItem('hint')">
                        <span class="item-icon">💡</span>
                        <span>提示</span>
                        <span class="item-count" id="hint-count">0</span>
                    </button>
                    <button class="btn btn-success item-btn" id="item-potion" onclick="useItem('potion')">
                        <span class="item-icon">🧪</span>
                        <span>药水</span>
                        <span class="item-count" id="potion-count">0</span>
                    </button>
                    <button class="btn btn-primary item-btn" id="item-shield" onclick="useItem('shield')">
                        <span class="item-icon">🛡️</span>
                        <span>护盾</span>
                        <span class="item-count" id="shield-count">0</span>
                    </button>
                    <button class="btn btn-gold item-btn" id="item-time" onclick="useItem('time')">
                        <span class="item-icon">⏳</span>
                        <span>沙漏</span>
                        <span class="item-count" id="time-count">0</span>
                    </button>
                </div>

                <div class="question-box">
                    <div class="question-text" id="question-text">加载中...</div>
                    <div class="hint-text" id="hint-text" style="display: none;"></div>
                </div>

                <div class="answer-options" id="answer-options"></div>
            </div>
        </div>

        <!-- 关卡选择 -->
        <div id="page-levels" class="page">
            <div class="content-with-nav">
                <h2 class="title">🗺️ 选择关卡</h2>
                <div class="level-grid" id="level-grid"></div>
                <button class="btn btn-outline" onclick="showPage('menu')">返回主菜单</button>
            </div>
        </div>

        <!-- 商店 -->
        <div id="page-shop" class="page">
            <div class="content-with-nav">
                <h2 class="title">🛒 商店</h2>
                <div class="status-bar">
                    <div class="status-item">
                        <span class="status-icon">🪙</span>
                        <span id="shop-coins">0</span>
                    </div>
                </div>
                <div class="shop-grid" id="shop-grid"></div>
                <button class="btn btn-outline" onclick="showPage('menu')">返回主菜单</button>
            </div>
        </div>

        <!-- 成就 -->
        <div id="page-achievements" class="page">
            <div class="content-with-nav">
                <h2 class="title">🏆 成就</h2>
                <div class="achievement-grid" id="achievement-grid"></div>
                <button class="btn btn-outline" onclick="showPage('menu')">返回主菜单</button>
            </div>
        </div>

        <!-- 错题本 -->
        <div id="page-wrong-notes" class="page">
            <div class="content-with-nav">
                <h2 class="title">📖 错题本</h2>
                <div id="wrong-notes-list"></div>
                <button class="btn btn-outline" onclick="clearWrongNotes()">清空错题本</button>
                <button class="btn btn-outline" onclick="showPage('menu')">返回主菜单</button>
            </div>
        </div>

            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="showPage('menu')" data-page="menu">
            <span class="nav-icon">🏠</span>
            <span>主页</span>
        </button>
        <button class="nav-btn" onclick="showPage('levels')" data-page="levels">
            <span class="nav-icon">🗺️</span>
            <span>关卡</span>
        </button>
        <button class="nav-btn" onclick="showPage('shop')" data-page="shop">
            <span class="nav-icon">🛒</span>
            <span>商店</span>
        </button>
    </nav>

    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">标题</div>
            <div class="modal-text" id="modal-text">内容</div>
            <button class="btn btn-primary" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 游戏数据
        const monsters = ['👾', '👹', '👺', '👻', '👽', '🤖', '🦇', '🐉', '🦂', '🕷️'];
        const monsterNames = ['初级小怪', '文字精灵', '语法幽灵', '时态怪物', '变形外星人', '机器人', '黑暗蝙蝠', '喷火巨龙', '沙漠蝎子', '终极BOSS'];

        const questions = [
            // Level 1: 基本现在进行时
            { q: "She _____ (read) a book now.", options: ["read", "is reading", "reads", "reading"], answer: 1, level: 1 },
            { q: "They _____ (play) in the park.", options: ["play", "are playing", "plays", "playing"], answer: 1, level: 1 },
            { q: "I _____ (eat) breakfast.", options: ["eat", "am eating", "eats", "eating"], answer: 1, level: 1 },
            { q: "He _____ (watch) TV.", options: ["watch", "is watching", "watches", "watching"], answer: 1, level: 1 },
            { q: "We _____ (study) English.", options: ["study", "are studying", "studies", "studying"], answer: 1, level: 1 },
            { q: "The cat _____ (sleep) now.", options: ["sleep", "is sleeping", "sleeps", "sleeping"], answer: 1, level: 1 },
            { q: "My mother _____ (cook) dinner.", options: ["cook", "is cooking", "cooks", "cooking"], answer: 1, level: 1 },
            { q: "The birds _____ (fly) in the sky.", options: ["fly", "are flying", "flies", "flying"], answer: 1, level: 1 },
            
            // Level 2: 现在进行时疑问句
            { q: "_____ you _____ (listen) to music?", options: ["Are", "Is", "Do", "Does"], answer: 0, level: 2 },
            { q: "What _____ he _____ (do)?", options: ["are", "is", "do", "does"], answer: 1, level: 2 },
            { q: "_____ she _____ (come) tomorrow?", options: ["Are", "Is", "Do", "Does"], answer: 1, level: 2 },
            { q: "Where _____ they _____ (go)?", options: ["are", "is", "do", "does"], answer: 0, level: 2 },
