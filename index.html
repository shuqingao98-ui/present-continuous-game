<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦖 语法打怪大冒险 - 现在进行时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'YouYuan', cursive, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        .game-container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            border: 5px solid #e94560;
        }
        .header {
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            padding: 12px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 1.3em; margin-bottom: 8px; }
        .stats { display: flex; justify-content: space-around; font-size: 0.95em; }
        .stat-item { background: rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 12px; }
        .content { padding: 15px; }
        
        .battle-scene {
            position: relative;
            height: 200px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .battle-ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25px;
            background: #2d3436;
        }
        
        .player {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 2.2em;
            transition: all 0.3s;
            z-index: 10;
        }
        .player.attacking {
            animation: playerAttack 0.4s ease-in-out;
        }
        @keyframes playerAttack {
            0% { left: 20px; transform: scaleX(1); }
            50% { left: 180px; transform: scaleX(1); }
            100% { left: 20px; transform: scaleX(1); }
        }
        
        .player-sword {
            position: absolute;
            left: 60px;
            bottom: 35px;
            font-size: 1.8em;
            opacity: 0;
            z-index: 11;
        }
        .player-sword.slash {
            animation: swordSlash 0.4s ease-in-out;
        }
        @keyframes swordSlash {
            0% { opacity: 0; left: 60px; transform: rotate(0deg); }
            30% { opacity: 1; left: 150px; transform: rotate(-30deg); }
            60% { opacity: 1; left: 180px; transform: rotate(30deg); }
            100% { opacity: 0; left: 200px; transform: rotate(0deg); }
        }
        
        .monster {
            position: absolute;
            bottom: 20px;
            right: 20px;
            transition: all 0.3s;
            z-index: 10;
        }
        .monster.hit {
            animation: monsterHit 0.5s ease-in-out;
        }
        @keyframes monsterHit {
            0% { transform: translateX(0); filter: brightness(1); }
            20% { transform: translateX(-20px); filter: brightness(2) sepia(1) hue-rotate(-50deg); }
            40% { transform: translateX(10px); filter: brightness(1.5); }
            60% { transform: translateX(-10px); filter: brightness(1.8); }
            80% { transform: translateX(5px); filter: brightness(1.2); }
            100% { transform: translateX(0); filter: brightness(1); }
        }
        .monster.defeated {
            animation: monsterDefeated 0.8s forwards;
        }
        @keyframes monsterDefeated {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.3) rotate(15deg); }
            100% { transform: scale(0) rotate(30deg); opacity: 0; bottom: -50px; }
        }
        
        .attack-text {
            position: absolute;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0 #e94560, -1px -1px 0 #000;
            opacity: 0;
            z-index: 20;
        }
        .attack-text.show {
            animation: attackTextAnim 0.8s forwards;
        }
        @keyframes attackTextAnim {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            30% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }
        
        .hp-bar {
            position: absolute;
            top: 5px;
            right: 15px;
            width: 70px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.3s;
        }
        
        .star {
            position: absolute;
            color: #fff;
            font-size: 0.7em;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .level-display {
            position: absolute;
            top: 5px;
            left: 10px;
            background: rgba(233, 69, 96, 0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .question-area {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 3px solid #e94560;
        }
        .question-text { font-size: 1.05em; color: #333; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .option-btn {
            background: white;
            border: 3px solid #e94560;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9em;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .option-btn:hover { background: #e94560; color: white; }
        .option-btn.correct { background: #00b894; border-color: #00b894; color: white; }
        .option-btn.wrong { background: #d63031; border-color: #d63031; color: white; }
        .feedback { text-align: center; font-size: 0.9em; margin-top: 10px; min-height: 20px; font-weight: bold; }
        .feedback.correct { color: #00b894; }
        .feedback.wrong { color: #d63031; }
        
        .btn {
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); }
        
        .hidden { display: none; }
        
        .start-screen, .end-screen, .level-select-screen { text-align: center; padding: 20px; }
        .start-screen h2, .end-screen h2, .level-select-screen h2 { font-size: 1.4em; color: #e94560; margin-bottom: 15px; }
        .start-screen p { font-size: 0.95em; color: #666; margin-bottom: 20px; line-height: 1.6; }
        .monster-collection { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 15px 0; font-size: 1.6em; }
        
        .level-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .level-btn { 
            background: #fff; 
            border: 3px solid #e94560; 
            padding: 10px 5px; 
            border-radius: 12px; 
            font-size: 0.9em; 
            cursor: pointer; 
            font-family: inherit; 
            font-weight: bold;
        }
        .level-btn:hover { background: #e94560; color: white; }
        .level-btn.completed { background: #00b894; border-color: #00b894; color: white; }
        
        .victory-screen { text-align: center; padding: 20px; }
        .victory-screen h2 { font-size: 1.4em; color: #ffd700; margin-bottom: 15px; }
        .victory-emoji { font-size: 4em; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🦖 语法打怪大冒险</h1>
            <div class="stats">
                <div class="stat-item">⚔️ <span id="score">0</span></div>
                <div class="stat-item">❤️ <span id="lives">3</span></div>
                <div class="stat-item">👹 <span id="monsters">0</span>/10</div>
            </div>
        </div>
        <div class="content">
            <div class="start-screen" id="startScreen">
                <div style="font-size: 3em; margin: 15px 0;">🦖⚔️🏰</div>
                <h2>欢迎来到现在进行时打怪王国！</h2>
                <p>答对问题，攻击怪兽！<br>每关一只怪兽，每答对1题 = 打1次！<br>8题全对 = 打败怪兽！<br><br>共10关，越往后怪兽越强！<br><br>开始挑战吧！⚔️</p>
                <button class="btn" onclick="showLevelSelect()">选择关卡</button>
            </div>
            
            <div class="level-select-screen hidden" id="levelSelectScreen">
                <h2>选择关卡 🎯</h2>
                <div class="level-select" id="levelSelect"></div>
                <button class="btn" onclick="startFromLevel(1)">从第1关开始</button>
            </div>
            
            <div class="game-screen hidden" id="gameScreen">
                <div class="battle-scene" id="battleScene">
                    <div class="level-display" id="levelDisplay">第 1 关</div>
                    <div class="hp-bar"><div class="hp-fill" id="hpFill"></div></div>
                    <div class="player" id="player">🦸</div>
                    <div class="player-sword" id="playerSword">⚔️</div>
                    <div class="monster" id="monster">👾</div>
                    <div class="attack-text" id="attackText">⚔️</div>
                    <div class="battle-ground"></div>
                </div>
                
                <div class="question-area">
                    <div class="question-text" id="questionText">题目加载中...</div>
                    <div class="options" id="options"></div>
                </div>
                <div class="feedback" id="feedback"></div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            </div>
            
            <div class="victory-screen hidden" id="victoryScreen">
                <div class="victory-emoji" id="victoryEmoji">🏆</div>
                <h2 id="victoryTitle">🎉 怪兽被打败了！</h2>
                <p id="victoryMessage">太厉害了！</p>
                <p style="font-size: 1.1em; color: #e94560; margin: 15px 0;">
                    获得 <strong id="victoryScore">0</strong> 分！
                </p>
                <button class="btn" id="nextLevelBtn" onclick="goToNextLevel()">下一关 →</button>
                <button class="btn" onclick="showLevelSelect()" style="background: #666;">返回选关</button>
            </div>
            
            <div class="end-screen hidden" id="endScreen">
                <div style="font-size: 4em; margin: 15px 0;">🏆👑</div>
                <h2 id="endTitle">🎉 全部通关！</h2>
                <p id="endMessage">你是语法王者！</p>
                <p style="font-size: 1.2em; color: #e94560; margin: 15px 0;">
                    总得分: <strong id="finalScore">0</strong>
                </p>
                <div class="monster-collection" id="monsterCollection"></div>
                <button class="btn" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>
    
    <script>
        const monsters = [
            { emoji: '👾', name: '小怪', size: '2em' },
            { emoji: '🦇', name: '蝙蝠', size: '2.2em' },
            { emoji: '🕷️', name: '蜘蛛', size: '2.2em' },
            { emoji: '🐍', name: '蛇', size: '2.3em' },
            { emoji: '🧟', name: '僵尸', size: '2.4em' },
            { emoji: '👹', name: '恶鬼', size: '2.5em' },
            { emoji: '🐺', name: '狼人', size: '2.5em' },
            { emoji: '🦍', name: '金刚', size: '2.6em' },
            { emoji: '🐉', name: '巨龙', size: '2.8em' },
            { emoji: '👺', name: '大Boss', size: '3em' }
        ];
        
        // 现在进行时题目（语法已检查）
        const levelQuestions = [
            // 第1关：现在进行时基本结构 be + doing
            [
                { text: "I ___ reading a book now.", options: ["am", "is", "are"], answer: 0, hint: "I + am" },
                { text: "She ___ sleeping.", options: ["am", "is", "are"], answer: 1, hint: "She + is" },
                { text: "They ___ playing games.", options: ["am", "is", "are"], answer: 2, hint: "They + are" },
                { text: "He ___ playing football.", options: ["am", "is", "are"], answer: 1, hint: "He + is" },
                { text: "We ___ watching TV.", options: ["am", "is", "are"], answer: 2, hint: "We + are" },
                { text: "Look! The bird ___ flying.", options: ["is", "are", "am"], answer: 0, hint: "单数用 is" },
                { text: "Listen! She ___ singing.", options: ["is", "are", "am"], answer: 0, hint: "She + is" },
                { text: "The baby ___ crying.", options: ["is", "are", "am"], answer: 0, hint: "单数用 is" }
            ],
            // 第2关：I am doing
            [
                { text: "I ___ eating breakfast.", options: ["am", "is", "are"], answer: 0, hint: "I + am" },
                { text: "I ___ reading a book.", options: ["am reading", "is reading", "are reading"], answer: 0, hint: "I + am + doing" },
                { text: "I ___ now.", options: ["am sleeping", "is sleeping", "are sleeping"], answer: 0, hint: "I + am + doing" },
                { text: "I ___ my homework.", options: ["am doing", "is doing", "are doing"], answer: 0, hint: "am doing homework" },
                { text: "Look! I ___ a kite.", options: ["am flying", "is flying", "are flying"], answer: 0, hint: "am flying a kite" },
                { text: "I ___ in the river.", options: ["am swimming", "is swimming", "are swimming"], answer: 0, hint: "am swimming" },
                { text: "Now I ___ to music.", options: ["am listening", "is listening", "are listening"], answer: 0, hint: "am listening to music" },
                { text: "I ___ a picture.", options: ["am drawing", "is drawing", "are drawing"], answer: 0, hint: "am drawing a picture" }
            ],
            // 第3关：He/She is doing
            [
                { text: "He ___ playing football.", options: ["am", "is", "are"], answer: 1, hint: "He + is" },
                { text: "She ___ a cake.", options: ["is making", "are making", "am making"], answer: 0, hint: "She + is + making" },
                { text: "He ___ English.", options: ["is studying", "are studying", "am studying"], answer: 0, hint: "is studying English" },
                { text: "Look! She ___ dance.", options: ["is", "are", "am"], answer: 0, hint: "She + is" },
                { text: "My mother ___ cooking.", options: ["is", "are", "am"], answer: 0, hint: "第三人称单数 + is" },
                { text: "The teacher ___ writing.", options: ["is", "are", "am"], answer: 0, hint: "单数 + is" },
                { text: "He ___ basketball.", options: ["is playing", "are playing", "am playing"], answer: 0, hint: "is playing basketball" },
                { text: "She ___ to her friend.", options: ["is talking", "are talking", "am talking"], answer: 0, hint: "is talking to friend" }
            ],
            // 第4关：They are doing / We are doing
            [
                { text: "They ___ playing games.", options: ["am", "is", "are"], answer: 2, hint: "They + are" },
                { text: "We ___ English.", options: ["is studying", "are studying", "am studying"], answer: 1, hint: "We + are + studying" },
                { text: "The children ___ in the park.", options: ["is playing", "are playing", "am playing"], answer: 1, hint: "children 复数，用 are" },
                { text: "Look! They ___ a snowman.", options: ["is making", "are making", "am making"], answer: 1, hint: "are making a snowman" },
                { text: "They ___ breakfast.", options: ["is eating", "are eating", "am eating"], answer: 1, hint: "are eating breakfast" },
                { text: "My friends ___ to me.", options: ["is listening", "are listening", "am listening"], answer: 1, hint: "are listening to me" },
                { text: "They ___ on the computer.", options: ["is working", "are working", "am working"], answer: 1, hint: "are working" },
                { text: "We ___ about the future.", options: ["is talking", "are talking", "am talking"], answer: 1, hint: "are talking about" }
            ],
            // 第5关：否定句 be + not + doing
            [
                { text: "I ___ sleeping.", options: ["am not", "is not", "are not"], answer: 0, hint: "I + am not" },
                { text: "She ___ eating.", options: ["am not", "is not", "are not"], answer: 1, hint: "She + is not" },
                { text: "They ___ playing.", options: ["am not", "is not", "aren't"], answer: 2, hint: "They + aren't" },
                { text: "He ___ working today.", options: ["am not", "isn't", "aren't"], answer: 1, hint: "He + isn't" },
                { text: "We ___ watching TV.", options: ["am not", "is not", "aren't"], answer: 2, hint: "We + aren't" },
                { text: "The cat ___ sleeping.", options: ["am not", "isn't", "aren't"], answer: 1, hint: "isn't" },
                { text: "You ___ listening to me!", options: ["am not", "isn't", "aren't"], answer: 2, hint: "aren't" },
                { text: "I ___ doing my homework.", options: ["am not", "isn't", "aren't"], answer: 0, hint: "am not" }
            ],
            // 第6关：疑问句 Are you... / Is he... / Are they...
            [
                { text: "___ you sleeping?", options: ["Are", "Is", "Am"], answer: 0, hint: "Are you...?" },
                { text: "___ she eating?", options: ["Are", "Is", "Am"], answer: 1, hint: "Is she...?" },
                { text: "___ they playing?", options: ["Are", "Is", "Am"], answer: 0, hint: "Are they...?" },
                { text: "___ he working?", options: ["Are", "Is", "Am"], answer: 1, hint: "Is he...?" },
                { text: "Yes, I ___.", options: ["am", "is", "are"], answer: 0, hint: "Yes, I am" },
                { text: "No, she ___.", options: ["am not", "isn't", "aren't"], answer: 1, hint: "No, she isn't" },
                { text: "___ we doing well?", options: ["Are", "Is", "Am"], answer: 0, hint: "Are we...?" },
                { text: "___ it raining?", options: ["Are", "Is", "Am"], answer: 1, hint: "Is it...?" }
            ],
            // 第7关：现在进行时动词变化
            [
                { text: "He ___ to school.", options: ["go", "going", "goes"], answer: 1, hint: "go → going" },
                { text: "She is ___ a song.", options: ["sing", "singing", "sings"], answer: 1, hint: "sing → singing" },
                { text: "They are ___ games.", options: ["play", "playing", "plays"], answer: 1, hint: "play → playing" },
                { text: "We are ___ in the park.", options: ["run", "running", "runs"], answer: 1, hint: "run → running" },
                { text: "I am ___ a picture.", options: ["draw", "drawing", "draws"], answer: 1, hint: "draw → drawing" },
                { text: "She is ___ her homework.", options: ["do", "doing", "does"], answer: 1, hint: "do → doing" },
                { text: "He is ___ to music.", options: ["listen", "listening", "listens"], answer: 1, hint: "listen → listening" },
                { text: "They are ___ in the classroom.", options: ["study", "studying", "studies"], answer: 1, hint: "study → studying" }
            ],
            // 第8关：现在进行时用法
            [
                { text: "Look! The bird ___ in the sky.", options: ["is flying", "are flying", "am flying"], answer: 0, hint: "单数 + is flying" },
                { text: "Listen! Someone ___ at the door.", options: ["is knocking", "are knocking", "am knocking"], answer: 0, hint: "单数 + is knocking" },
                { text: "The children ___ in the garden.", options: ["is playing", "are playing", "am playing"], answer: 1, hint: "复数 + are playing" },
                { text: "My dad ___ TV now.", options: ["is watching", "are watching", "am watching"], answer: 0, hint: "is watching TV" },
                { text: "The sun ___ in the east.", options: ["is rising", "are rising", "am rising"], answer: 0, hint: "单数 + is rising" },
                { text: "I ___ my best friend now.", options: ["am missing", "is missing", "are missing"], answer: 0, hint: "am missing" },
                { text: "She ___ a letter now.", options: ["is writing", "are writing", "am writing"], answer: 0, hint: "is writing" },
                { text: "They ___ about you.", options: ["is talking", "are talking", "am talking"], answer: 1, hint: "are talking about you" }
            ],
            // 第9关：综合练习
            [
                { text: "I ___ (not/sleep).", options: ["am not sleeping", "is not sleeping", "aren't sleeping"], answer: 0, hint: "I + am not sleeping" },
                { text: "___ you ___ (read)? Yes, I ___.", options: ["Are / reading / am", "Is / reading / is", "Are / reading / are"], answer: 0, hint: "Are you reading" },
                { text: "She ___ (cook) dinner.", options: ["is cooking", "are cooking", "am cooking"], answer: 0, hint: "is cooking" },
                { text: "They ___ (play) in the park.", options: ["is playing", "are playing", "am playing"], answer: 1, hint: "are playing" },
                { text: "Look! The cat ___ (climb) the tree.", options: ["is climbing", "are climbing", "am climbing"], answer: 0, hint: "is climbing" },
                { text: "He ___ (not/work) today.", options: ["isn't working", "aren't working", "am not working"], answer: 0, hint: "isn't working" },
                { text: "We ___ (not/eat).", options: ["am not eating", "is not eating", "aren't eating"], answer: 2, hint: "aren't eating" },
                { text: "___ they ___ (swim) now?", options: ["Is / swimming", "Are / swimming", "Do / swimming"], answer: 1, hint: "Are they swimming" }
            ],
            // 第10关：终极挑战
            [
                { text: "Listen! Someone ___ (knock) at the door.", options: ["is knocking", "are knocking", "am knocking"], answer: 0, hint: "is knocking" },
                { text: "Look! The baby ___ (cry).", options: ["is crying", "are crying", "am crying"], answer: 0, hint: "is crying" },
                { text: "I usually ___ (go) to school, but now I ___ (wait) for the bus.", options: ["go / am waiting", "goes / is waiting", "go / is waiting"], answer: 0, hint: "usually用原形，现在进行时用am waiting" },
                { text: "Now my mother ___ (cook) dinner.", options: ["is cooking", "are cooking", "am cooking"], answer: 0, hint: "is cooking" },
                { text: "What ___ you ___ (do) now?", options: ["are / doing", "is / doing", "am / doing"], answer: 0, hint: "What are you doing" },
                { text: "The children ___ (play) in the snow.", options: ["is playing", "are playing", "am playing"], answer: 1, hint: "are playing" },
                { text: "___ she ___ (come) now?", options: ["Is / coming", "Are / coming", "Do / coming"], answer: 0, hint: "Is she coming" },
                { text: "I ___ (not/understand).", options: ["am not understanding", "isn't understanding", "aren't understanding"], answer: 0, hint: "am not understanding" }
            ]
        ];
        
        let gameState = {
            currentLevel: 1,
            currentQuestion: 0,
            score: 0,
            lives: 3,
            totalDefeated: 0,
            completedLevels: [],
            levelQuestions: [],
            correctInLevel: 0,
            hp: 8,
            maxHp: 8
        };
        
        function saveGame() {
            localStorage.setItem('monsterGameStatePC2', JSON.stringify(gameState));
        }
        
        function loadGame() {
            const saved = localStorage.getItem('monsterGameStatePC2');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                gameState.lives = 3;
            }
            updateStats();
        }
        
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function updateStats() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = '❤️'.repeat(gameState.lives);
            document.getElementById('monsters').textContent = gameState.totalDefeated;
        }
        
        function showLevelSelect() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('levelSelectScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            
            const levelSelect = document.getElementById('levelSelect');
            levelSelect.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                
                if (gameState.completedLevels.includes(i)) {
                    btn.classList.add('completed');
                    btn.innerHTML = monsters[i-1].emoji + '<br>✅';
                } else {
                    btn.innerHTML = monsters[i-1].emoji + '<br>第' + i + '关';
                }
                
                btn.onclick = () => startFromLevel(i);
                levelSelect.appendChild(btn);
            }
        }
        
        function startFromLevel(level) {
            gameState.currentLevel = level;
            gameState.currentQuestion = 0;
            gameState.lives = 3;
            gameState.correctInLevel = 0;
            gameState.maxHp = 8;
            gameState.hp = 8;
            gameState.levelQuestions = shuffleArray([...levelQuestions[level - 1]]);
            
            document.getElementById('levelSelectScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            
            const monster = monsters[level - 1];
            const monsterEl = document.getElementById('monster');
            monsterEl.textContent = monster.emoji;
            monsterEl.style.fontSize = monster.size;
            monsterEl.classList.remove('hit', 'defeated');
            
            document.getElementById('levelDisplay').textContent = '第 ' + level + ' 关 - ' + monster.name;
            
            createStars();
            loadQuestion();
            updateHp();
            updateStats();
            saveGame();
        }
        
        function createStars() {
            const scene = document.getElementById('battleScene');
            scene.querySelectorAll('.star').forEach(s => s.remove());
            
            for (let i = 0; i < 12; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.left = Math.random() * 450 + 'px';
                star.style.top = Math.random() * 100 + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                scene.appendChild(star);
            }
        }
        
        function loadQuestion() {
            const q = gameState.levelQuestions[gameState.currentQuestion];
            
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('feedback').textContent = '';
            document.getElementById('nextBtn').style.display = 'none';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });
            
            window.canAnswer = true;
        }
        
        function checkAnswer(selectedIndex, btn) {
            if (!window.canAnswer) return;
            window.canAnswer = false;
            
            const q = gameState.levelQuestions[gameState.currentQuestion];
            const feedback = document.getElementById('feedback');
            const player = document.getElementById('player');
            const sword = document.getElementById('playerSword');
            const monster = document.getElementById('monster');
            const attackText = document.getElementById('attackText');
            
            if (selectedIndex === q.answer) {
                btn.classList.add('correct');
                
                player.classList.add('attacking');
                sword.classList.add('slash');
                monster.classList.add('hit');
                attackText.textContent = '⚔️ -1 HP';
                attackText.classList.add('show');
                
                setTimeout(() => {
                    player.classList.remove('attacking');
                    sword.classList.remove('slash');
                    monster.classList.remove('hit');
                    attackText.classList.remove('show');
                }, 800);
                
                gameState.hp--;
                gameState.correctInLevel++;
                gameState.score += 10;
                
                feedback.textContent = '⚔️ 攻击成功！再接再厉！';
                feedback.className = 'feedback correct';
                
                updateHp();
                
                if (gameState.hp <= 0) {
                    setTimeout(() => defeatMonster(), 1000);
                    return;
                }
                
            } else {
                btn.classList.add('wrong');
                feedback.textContent = '💡 ' + q.hint;
                feedback.className = 'feedback wrong';
                gameState.lives--;
                
                if (gameState.lives <= 0) {
                    setTimeout(() => {
                        alert('生命用完了！回到选择关卡～');
                        showLevelSelect();
                    }, 1000);
                    return;
                }
            }
            
            updateStats();
            document.getElementById('nextBtn').style.display = 'block';
            saveGame();
        }
        
        function updateHp() {
            const hpPercent = (gameState.hp / gameState.maxHp) * 100;
            document.getElementById('hpFill').style.width = hpPercent + '%';
        }
        
        function nextQuestion() {
            gameState.currentQuestion++;
            
            if (gameState.currentQuestion >= 8) {
                if (gameState.hp <= 0) {
                    defeatMonster();
                } else {
                    alert('这一关没有全部答对！怪兽还在！再试一次！');
                    startFromLevel(gameState.currentLevel);
                }
                return;
            }
            
            loadQuestion();
        }
        
        function defeatMonster() {
            const monster = monsters[gameState.currentLevel - 1];
            const monsterEl = document.getElementById('monster');
            monsterEl.classList.add('defeated');
            
            gameState.score += 50;
            gameState.totalDefeated++;
            gameState.completedLevels.push(gameState.currentLevel);
            
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.remove('hidden');
            
            document.getElementById('victoryEmoji').textContent = monster.emoji;
            document.getElementById('victoryTitle').textContent = '🎉 ' + monster.name + '被打败了！';
            document.getElementById('victoryMessage').textContent = '你击败了它！';
            document.getElementById('victoryScore').textContent = gameState.score;
            
            if (gameState.currentLevel >= 10) {
                setTimeout(() => showFinalVictory(), 2000);
                document.getElementById('nextLevelBtn').style.display = 'none';
            } else {
                document.getElementById('nextLevelBtn').style.display = 'block';
                document.getElementById('nextLevelBtn').textContent = '下一关 →';
            }
            
            updateStats();
            saveGame();
        }
        
        function goToNextLevel() {
            if (gameState.currentLevel < 10) {
                startFromLevel(gameState.currentLevel + 1);
            }
        }
        
        function showFinalVictory() {
            document.getElementById('victoryScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            
            document.getElementById('endTitle').textContent = '🎉 全部通关！';
            document.getElementById('endMessage').textContent = '你是真正的语法王者！';
            document.getElementById('finalScore').textContent = gameState.score;
            
            const collection = document.getElementById('monsterCollection');
            collection.innerHTML = '';
            monsters.forEach(m => {
                const span = document.createElement('span');
                span.textContent = m.emoji;
                collection.appendChild(span);
            });
        }
        
        function restartGame() {
            gameState = {
                currentLevel: 1,
                currentQuestion: 0,
                score: 0,
                lives: 3,
                totalDefeated: 0,
                completedLevels: [],
                levelQuestions: [],
                correctInLevel: 0,
                hp: 8,
                maxHp: 8
            };
            saveGame();
            showLevelSelect();
        }
        
        window.onload = function() {
            loadGame();
            showLevelSelect();
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('levelSelectScreen').classList.add('hidden');
        };
    </script>
</body>
</html>
